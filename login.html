<!DOCTYPE html>
<html>
<head>
<title>User Login</title>

<style>

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #667eea, #764ba2);
}

.container {
    background: #ffffff;
    padding: 40px 35px;
    width: 380px;
    border-radius: 15px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    text-align: center;
    animation: fadeIn 0.6s ease-in-out;
}

h2 {
    margin-bottom: 25px;
    color: #333;
    font-weight: 600;
}

input {
    width: 100%;
    padding: 12px 15px;
    margin: 10px 0;
    border: 1px solid #ddd;
    border-radius: 8px;
    outline: none;
    font-size: 14px;
    transition: 0.3s;
}

input:focus {
    border-color: #667eea;
    box-shadow: 0 0 8px rgba(102,126,234,0.4);
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    border: none;
    border-radius: 8px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(0,0,0,0.2);
}

#msg {
    margin-top: 15px;
    font-weight: 500;
    color: red;
}

/* Optional extra links */
.links {
    margin-top: 15px;
    font-size: 14px;
}

.links a {
    text-decoration: none;
    color: #667eea;
    font-weight: 500;
}

.links a:hover {
    text-decoration: underline;
}

/* Animation */
@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

</style>
</head>

<body>

<div class="container">

<h2>User Login</h2>

<input type="text" id="username" placeholder="Username" required>
<input type="password" id="password" placeholder="Password" required>

<button onclick="login()">Login</button>

<p id="msg"></p>

<div class="links">
    <p>Don't have an account? <a href="userRegistration.html">Register</a></p>
</div>

</div>

<script>

function login() {

let data = {
username: document.getElementById("username").value,
password: document.getElementById("password").value
};

fetch("https://grievance-project-qx7a.onrender.com/api/auth/login/password", {
method: "POST",
headers: { "Content-Type": "application/json" },
body: JSON.stringify(data)
})
.then(res => res.text())
.then(response => {

document.getElementById("msg").innerHTML = response;

if (response.includes("OTP sent")) {
localStorage.setItem("username", data.username);
window.location.href = "login-otp.html";
}

})
.catch(error => {
document.getElementById("msg").innerHTML = "Login error!";
});

}

</script>

</body>
</html>
