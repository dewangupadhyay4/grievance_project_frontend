<!DOCTYPE html>
<html>
<head>
<title>Raise Grievance</title>

<style>

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #667eea, #764ba2);
  padding: 20px;
}

.container {
  background: #ffffff;
  width: 100%;
  max-width: 650px;
  padding: 35px;
  border-radius: 15px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.2);
  animation: fadeIn 0.6s ease-in-out;
}

h2 {
  text-align: center;
  margin-bottom: 25px;
  color: #333;
}

.form-group {
  margin-bottom: 15px;
}

input, textarea, select {
  width: 100%;
  padding: 12px 14px;
  border: 1px solid #ddd;
  border-radius: 8px;
  font-size: 14px;
  outline: none;
  transition: 0.3s;
}

textarea {
  resize: none;
  height: 90px;
}

input:focus, textarea:focus, select:focus {
  border-color: #667eea;
  box-shadow: 0 0 8px rgba(102,126,234,0.3);
}

button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 8px;
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 20px rgba(0,0,0,0.2);
}

button:disabled {
  background: #999;
  cursor: not-allowed;
}

#locationStatus {
  font-size: 13px;
  margin-bottom: 15px;
  color: #555;
}

#msg {
  margin-top: 15px;
  font-weight: 600;
  text-align: center;
}

.success {
  color: green;
}

.error {
  color: red;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

</style>
</head>

<body>

<div class="container">

<h2>Raise Grievance</h2>

<div class="form-group">
<input type="text" id="title" placeholder="Grievance Title" required>
</div>

<div class="form-group">
<textarea id="description" placeholder="Describe your issue..." required></textarea>
</div>

<div class="form-group">
<select id="department">
  <option value="">Select Department</option>
  <option value="PWD">PWD</option>
  <option value="ELECTRICITY">ELECTRICITY</option>
  <option value="WATER">WATER</option>
  <option value="ROAD">ROAD</option>
  <option value="PUBLIC_WORKS">PUBLIC_WORKS</option>
</select>
</div>

<div class="form-group">
<input type="text" id="issueType" placeholder="Issue Type">
</div>

<div class="form-group">
<input type="text" id="state" placeholder="State">
</div>

<div class="form-group">
<input type="text" id="district" placeholder="District">
</div>

<div class="form-group">
<input type="text" id="city" placeholder="City">
</div>

<p id="locationStatus">Detecting location...</p>

<button id="submitBtn" onclick="raiseGrievance()" disabled>
Submit Grievance
</button>

<p id="msg"></p>

</div>

<script>

let userLatitude = null;
let userLongitude = null;

const submitBtn = document.getElementById("submitBtn");
const locationStatus = document.getElementById("locationStatus");
const msg = document.getElementById("msg");

/* ===============================
   FETCH LOCATION
================================= */

if (navigator.geolocation) {

  navigator.geolocation.getCurrentPosition(
    function(position) {

      userLatitude = position.coords.latitude;
      userLongitude = position.coords.longitude;

      locationStatus.innerHTML = "Location detected ✅";
      submitBtn.disabled = false;

    },
    function(error) {

      locationStatus.innerHTML =
        "Location access denied ❌ Please allow location permission.";
      submitBtn.disabled = true;

    },
    {
      enableHighAccuracy: true,
      timeout: 10000,
      maximumAge: 0
    }
  );

} else {
  locationStatus.innerHTML =
    "Geolocation not supported by this browser.";
}

/* ===============================
   SESSION EXPIRE HANDLER
================================= */

function handleSessionExpired() {

  msg.innerHTML = `
    <span class="error">Session expired. Please login again.</span><br><br>
    <button onclick="goToLogin()" style="width:200px;">
      Go To Login
    </button>
  `;

  msg.className = "";

}

/* ===============================
   NAVIGATE TO LOGIN
================================= */

function goToLogin() {
  localStorage.removeItem("username");
  window.location.href = "login.html";
}

/* ===============================
   RAISE GRIEVANCE
================================= */

function raiseGrievance() {

  let username = localStorage.getItem("username");

  if (!username) {
    handleSessionExpired();
    return;
  }

  let departmentValue = document.getElementById("department").value;

  if (departmentValue === "") {
    msg.innerHTML = "Please select a department!";
    msg.className = "error";
    return;
  }

  let grievance = {
    username: username,
    title: document.getElementById("title").value,
    description: document.getElementById("description").value,
    latitude: userLatitude,
    longitude: userLongitude,
    department: departmentValue,
    state: document.getElementById("state").value,
    district: document.getElementById("district").value,
    city: document.getElementById("city").value,
    issueType: document.getElementById("issueType").value
  };

  fetch("https://grievance-project-qx7a.onrender.com/api/grievances/raise", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(grievance)
  })
  .then(async response => {

    if (response.status === 401) {
      handleSessionExpired();
      return;
    }

    let text = await response.text();

    if (!response.ok) {
      throw new Error(text);
    }

    return JSON.parse(text);
  })
  .then(data => {

    if (!data) return;

    msg.innerHTML =
      "✅ Grievance Raised Successfully! Ticket: " + data.ticketNumber;
    msg.className = "success";

  })
  .catch(error => {

    msg.innerHTML = "❌ Error: " + error.message;
    msg.className = "error";

  });

}

</script>

</body>
</html>
