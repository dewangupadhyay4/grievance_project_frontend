<!DOCTYPE html>
<html>
<head>
<title>Grievance Portal - Register</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

/* 🔥 FIXED BACKGROUND (image + gradient together) */
body {
    min-height: 100vh;
    background: 
        linear-gradient(rgba(15, 23, 42, 0.75), rgba(15, 23, 42, 0.85)),
        url('https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?auto=format&fit=crop&w=1600&q=80');
    
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;

    display: flex;
    justify-content: center;
    align-items: center;
}

/* ✨ Particles (kept but lighter) */
body::after {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background-image: radial-gradient(white 1px, transparent 1px);
    background-size: 50px 50px;
    opacity: 0.05;
    animation: move 25s linear infinite;
}

@keyframes move {
    from { transform: translateY(0); }
    to { transform: translateY(-100px); }
}

/* 💎 Card */
.container {
    position: relative;
    z-index: 1;
    width: 380px;
    padding: 35px;
    border-radius: 20px;

    backdrop-filter: blur(18px);
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.2);

    box-shadow: 0 25px 60px rgba(0,0,0,0.6);
    color: white;

    animation: fadeUp 0.8s ease;
}

@keyframes fadeUp {
    from { opacity: 0; transform: translateY(40px);}
    to { opacity: 1; transform: translateY(0);}
}

h2 {
    text-align: center;
}

.subtitle {
    text-align: center;
    font-size: 13px;
    color: #ccc;
    margin-bottom: 20px;
}

/* Input */
.input-group {
    position: relative;
    margin: 15px 0;
}

.input-group input {
    width: 100%;
    padding: 12px 40px 12px 12px;
    border-radius: 10px;
    border: none;
    outline: none;
    background: rgba(255,255,255,0.2);
    color: white;
}

.input-group label {
    position: absolute;
    left: 12px;
    top: 12px;
    font-size: 13px;
    color: #ddd;
    transition: 0.3s;
}

.input-group input:focus + label,
.input-group input:valid + label {
    top: -8px;
    font-size: 11px;
    color: #fff;
}

/* Eye icon */
.input-group span {
    position: absolute;
    right: 12px;
    top: 12px;
    cursor: pointer;
}

/* Button */
button {
    width: 100%;
    padding: 12px;
    margin-top: 20px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(135deg, #ff7eb3, #ff758c);
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

/* Loader */
.loader {
    border: 3px solid transparent;
    border-top: 3px solid white;
    border-radius: 50%;
    width: 18px;
    height: 18px;
    animation: spin 1s linear infinite;
    display: inline-block;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}

/* Success */
.success {
    color: #00ffae;
    font-weight: bold;
    animation: pop 0.4s ease;
}

@keyframes pop {
    from {transform: scale(0.5); opacity: 0;}
    to {transform: scale(1); opacity: 1;}
}

#msg {
    text-align: center;
    margin-top: 15px;
}
</style>
</head>

<body>

<div class="container">
    <h2>📢 Grievance Portal</h2>
    <p class="subtitle">Raise your voice. We’ll resolve it.</p>

    <div class="input-group">
        <input type="text" id="firstName" required>
        <label>First Name</label>
    </div>

    <div class="input-group">
        <input type="text" id="middleName">
        <label>Middle Name</label>
    </div>

    <div class="input-group">
        <input type="text" id="lastName" required>
        <label>Last Name</label>
    </div>

    <div class="input-group">
        <input type="date" id="dob" required>
        <label>DOB</label>
    </div>

    <div class="input-group">
        <input type="text" id="phone" required>
        <label>Phone</label>
    </div>

    <div class="input-group">
        <input type="email" id="email" required>
        <label>Email</label>
    </div>

    <div class="input-group">
        <input type="text" id="address" required>
        <label>Address</label>
    </div>

    <div class="input-group">
        <input type="password" id="password" required>
        <label>Password</label>
        <span onclick="togglePassword()">👁️</span>
    </div>

    <button onclick="register()" id="btn">Register</button>

    <p id="msg"></p>
</div>

<script>
function togglePassword() {
    let pass = document.getElementById("password");
    pass.type = pass.type === "password" ? "text" : "password";
}

function register() {

let btn = document.getElementById("btn");
btn.innerHTML = '<span class="loader"></span>';
btn.disabled = true;

let user = {
firstName: document.getElementById("firstName").value,
middleName: document.getElementById("middleName").value,
lastName: document.getElementById("lastName").value,
dob: document.getElementById("dob").value,
phone: document.getElementById("phone").value,
email: document.getElementById("email").value,
address: document.getElementById("address").value,
password: document.getElementById("password").value
};

fetch("https://grievance-project-qx7a.onrender.com/api/users/register", {
method: "POST",
headers: { "Content-Type": "application/json" },
body: JSON.stringify(user)
})
.then(res => res.text())
.then(data => {

let msg = document.getElementById("msg");

if (data.includes("OTP sent")) {
msg.innerHTML = "✅ OTP Sent Successfully!";
msg.className = "success";

setTimeout(() => {
localStorage.setItem("email", user.email);
window.location.href = "otpVerification.html";
}, 1200);

} else {
msg.innerHTML = data;
}

btn.innerHTML = "Register";
btn.disabled = false;

})
.catch(error => {
document.getElementById("msg").innerHTML = "❌ Error occurred";
btn.innerHTML = "Register";
btn.disabled = false;
});
}
</script>

</body>
</html>
