<!DOCTYPE html>
<html>
<head>
<title>Register</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    min-height: 100vh;
    background: linear-gradient(-45deg, #667eea, #764ba2, #6a11cb, #2575fc);
    background-size: 400% 400%;
    animation: gradient 10s ease infinite;
    display: flex;
    justify-content: center;
    align-items: center;
}

@keyframes gradient {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

/* Card */
.container {
    width: 380px;
    padding: 35px;
    border-radius: 20px;
    backdrop-filter: blur(20px);
    background: rgba(255,255,255,0.1);
    box-shadow: 0 25px 60px rgba(0,0,0,0.3);
    color: white;
    animation: fadeUp 0.8s ease;
}

@keyframes fadeUp {
    from {
        opacity: 0;
        transform: translateY(40px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

h2 {
    text-align: center;
    margin-bottom: 25px;
}

/* Input */
.input-group {
    position: relative;
    margin: 18px 0;
}

.input-group input {
    width: 100%;
    padding: 12px 40px 12px 12px;
    border-radius: 10px;
    border: none;
    outline: none;
    background: rgba(255,255,255,0.2);
    color: white;
}

.input-group label {
    position: absolute;
    left: 12px;
    top: 12px;
    font-size: 14px;
    color: #ddd;
    transition: 0.3s;
}

.input-group input:focus + label,
.input-group input:valid + label {
    top: -8px;
    font-size: 11px;
    color: #fff;
}

/* Icon */
.input-group span {
    position: absolute;
    right: 12px;
    top: 12px;
    cursor: pointer;
}

/* Button */
button {
    width: 100%;
    padding: 12px;
    margin-top: 20px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(135deg, #ff7eb3, #ff758c);
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
    position: relative;
}

button:hover {
    transform: scale(1.05);
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

/* Loader */
.loader {
    border: 3px solid transparent;
    border-top: 3px solid white;
    border-radius: 50%;
    width: 18px;
    height: 18px;
    animation: spin 1s linear infinite;
    display: inline-block;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}

/* Success animation */
.success {
    color: #00ffae;
    font-weight: bold;
    animation: pop 0.5s ease;
}

@keyframes pop {
    0% {transform: scale(0.5); opacity: 0;}
    100% {transform: scale(1); opacity: 1;}
}

#msg {
    text-align: center;
    margin-top: 15px;
}
</style>
</head>

<body>

<div class="container">
    <h2>🚀 Create Account</h2>

    <div class="input-group">
        <input type="text" id="firstName" required>
        <label>First Name</label>
    </div>

    <div class="input-group">
        <input type="text" id="middleName">
        <label>Middle Name</label>
    </div>

    <div class="input-group">
        <input type="text" id="lastName" required>
        <label>Last Name</label>
    </div>

    <div class="input-group">
        <input type="date" id="dob" required>
        <label>DOB</label>
    </div>

    <div class="input-group">
        <input type="text" id="phone" required>
        <label>Phone</label>
    </div>

    <div class="input-group">
        <input type="email" id="email" required>
        <label>Email</label>
    </div>

    <div class="input-group">
        <input type="text" id="address" required>
        <label>Address</label>
    </div>

    <div class="input-group">
        <input type="password" id="password" required>
        <label>Password</label>
        <span onclick="togglePassword()">👁️</span>
    </div>

    <button onclick="register()" id="btn">Register</button>

    <p id="msg"></p>
</div>

<script>
function togglePassword() {
    let pass = document.getElementById("password");
    pass.type = pass.type === "password" ? "text" : "password";
}

function register() {

let btn = document.getElementById("btn");
btn.innerHTML = '<span class="loader"></span>';
btn.disabled = true;

let user = {
firstName: document.getElementById("firstName").value,
middleName: document.getElementById("middleName").value,
lastName: document.getElementById("lastName").value,
dob: document.getElementById("dob").value,
phone: document.getElementById("phone").value,
email: document.getElementById("email").value,
address: document.getElementById("address").value,
password: document.getElementById("password").value
};

fetch("https://grievance-project-qx7a.onrender.com/api/users/register", {
method: "POST",
headers: { "Content-Type": "application/json" },
body: JSON.stringify(user)
})
.then(res => res.text())
.then(data => {

let msg = document.getElementById("msg");

if (data.includes("OTP sent")) {
msg.innerHTML = "✅ OTP Sent Successfully!";
msg.className = "success";

setTimeout(() => {
localStorage.setItem("email", user.email);
window.location.href = "otpVerification.html";
}, 1200);

} else {
msg.innerHTML = data;
}

btn.innerHTML = "Register";
btn.disabled = false;

})
.catch(error => {
document.getElementById("msg").innerHTML = "❌ Something went wrong";
btn.innerHTML = "Register";
btn.disabled = false;
});
}
</script>

</body>
</html>
