<!DOCTYPE html>
<html>
<head>
<title>Authority Login</title>

<style>

body{
font-family: Arial;
background: linear-gradient(135deg,#667eea,#764ba2);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:30px;
border-radius:10px;
width:300px;
text-align:center;
}

input{
width:100%;
padding:10px;
margin:10px 0;
}

button{
padding:10px;
width:100%;
background:#667eea;
color:white;
border:none;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<h2>Authority Login</h2>

<input type="email" id="email" placeholder="Enter Email">

<input type="password" id="password" placeholder="Enter Password">

<button onclick="login()">Login</button>

<p id="msg"></p>

</div>

<script>

function login(){

let email=document.getElementById("email").value;
let password=document.getElementById("password").value;

fetch("https://grievance-project-qx7a.onrender.com/api/authority/login",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
email:email,
password:password
})

})
.then(res=>res.text())
.then(data=>{

document.getElementById("msg").innerText=data;

localStorage.setItem("authorityEmail",email);

window.location.href="otp.html";

});

}

</script>

</body>
</html>
